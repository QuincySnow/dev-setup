# =============================================================================
# Starship Prompt Configuration
# Generated by dev-setup
# Docs: https://starship.rs/config/
# =============================================================================

format = """
[в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ](bold green)
[в”Ӯ](bold green)$directory$rust$python$nodejs$golang$docker$git_branch$git_status
[в””в”Җ>](bold green) $character """

# Add newline before prompt
add_newline = true

# Character
[character]
success_symbol = "[вһң](bold green)"
error_symbol = "[вң—](bold red)"
vimcmd_symbol = "[вқ®](bold green)"

# Directory
[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$read_only]($read_only_color )[$symbol$path]($style)[$infos_hide]($hide)[ ](white)"

# Git branch
[git_branch]
symbol = " "
format = "on [$symbol$branch]($style) "
truncation_length = 4

# Git status
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "вҡ”пёҸ "
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
untracked = "?${count}"
stashed = "рҹ“Ұ"
modified = "!${count}"
staged = '+${count}'
renamed = "В»${count}"
deleted = "вңҳ${count}"

# Docker
[docker]
symbol = " "
format = "via [$symbol$context]($style) "

# Python
[python]
symbol = " "
format = "via [${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
pyenv_version_name = false
pyenv_prefix = "pyenv "

# Node.js
[nodejs]
symbol = " "
format = "via [$symbol($version )]($style) "

# Rust
[rust]
symbol = " "
format = "via [$symbol($version )]($style) "

# Golang
[golang]
symbol = " "
format = "via [$symbol($version )]($style) "

# Time
[time]
disabled = false
format = '[\($time\)]($style) '
time_format = "%R"
use_12hr = false

# AWS
[aws]
symbol = "  "
format = 'on [$symbol($profile )(\($region\) )]($style)'

# Time
[time]
disabled = true
