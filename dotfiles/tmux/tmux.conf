# =============================================================================
# tmux Configuration
# Generated by dev-setup
# =============================================================================

# Set prefix to Ctrl-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Start window numbering at 1
set -g base-index 1

# Start pane numbering at 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Refresh status more often
set -g status-interval 5

# Focus events
set -g focus-events on

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Enable vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Status bar
set -g status-style bg=colour235,fg=white
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=colour233,bg=colour241] #S #[fg=colour241,bg=colour235]⮀"
set -g status-right "#[fg=colour233,bg=colour235]⮂ #[fg=colour246,bg=colour235] %Y-%m-%d  %H:%M #[fg=colour252,bg=colour235]⮂#[fg=colour235,bg=colour252] #h "

# Windows
setw -g window-status-style fg=colour244,bg=colour235
setw -g window-status-current-style fg=colour223,bg=colour235
setw -g window-status-activity-style fg=colour228,bg=colour235

# Panes
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour240,bg=colour235

# Messages
set -g message-style fg=colour232,bg=colour223,bold
set -g message-command-style fg=colour232,bg=colour223,bold

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Don't rename windows automatically
set -g allow-rename off

# Escape time for vim compatibility
set -g escape-time 0
